<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文房具業務システム - ダッシュボード</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="dashboard">
<header>
  <h1>文房具業務システム</h1>
  <nav>
    <a href="index.html">ダッシュボード</a>
    <a href="products.html">商品</a>
    <a href="inventory.html">在庫</a>
    <a href="orders.html">受注</a>
    <a href="shipments.html">出荷</a>
  </nav>
</header>
<main>
  <section class="card">
    <h2>ログイン（担当者コードのみ）</h2>
    <form id="login-form" class="grid">
      <label>担当者コード<input name="staffCode" required /></label>
      <label>表示名（任意）<input name="displayName" /></label>
      <button type="submit">ログイン</button>
    </form>
    <div id="login-status" class="notice">未ログインです。</div>
  </section>

  <section class="card">
    <h2>業務導線</h2>
    <ol>
      <li>商品マスタ登録（商品）</li>
      <li>入出庫調整（在庫）</li>
      <li>受注登録（受注）</li>
      <li>出荷処理（出荷）</li>
    </ol>
  </section>
</main>
<script src="js/app.js"></script>
</body>
</html>
